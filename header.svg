<svg xmlns="http://www.w3.org/2000/svg" width="600" height="80">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7eb3">
        <animate attributeName="stop-color" values="#ff7eb3;#8b44ff;#44d0ff;#ff7eb3" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ff758c">
        <animate attributeName="stop-color" values="#ff758c;#ff7eb3;#8b44ff;#ff758c" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#gradient)" rx="12" />
  
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">
    Hey there 👋 I'm Shivam Mishra
  </text>
</svg>
